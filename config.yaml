fpl:
  team_id: 3122849

storage:
  db_path: data/fpl_autopilot.db

understat:
  season: "2025"   # Understat uses the start year; "2025" = the 2025/26 season

mode:
  current: manual  # auto | manual | hybrid

thresholds:
  min_ep_delta_for_transfer: 2.0
  min_ep_delta_for_hit_minus4: 4.0
  confidence_floor: 70
  max_transfers_per_gw_auto: 2
  max_hit_per_gw_auto: 4

deadguard:
  enabled: true
  warning_window_minutes: 120
  trigger_window_minutes: 30
  reeval_if_late_news: true
  reeval_lockout_minutes: 15
  scope:
    captain_vice: true
    bench_order: true
    auto_sub_flagged: true
    transfer_if_flagged: true
    transfer_if_underperform: false
    allow_hit: false
    min_ep_delta_for_transfer: 3.0

notifications:
  channel: telegram
  schedule:
    chip_preview_hours_before: 48
    transfer_preview_hours_before: 24
    final_reminder_hours_before: 2

xp_model:
  version: v1

unattended:
  enabled: false
  hours_before_deadline: 2

telegram:
  interactive: false

ai:
  enabled: true
  provider: ollama
  ollama:
    host: "http://localhost:11434"
    model: "qwen2.5:7b-instruct-q4_K_M"
  timeout_seconds: 15
  consecutive_failure_backoff: 3
  temperature: 0.2
  max_tokens_per_pane: 200
