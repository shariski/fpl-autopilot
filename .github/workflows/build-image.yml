name: Build & Deploy

# CI builds the image on GitHub's runners and pushes it to GHCR; the deploy
# job sshes to jumbo and rolls forward. Same pattern as the ig-pulse and
# kerf apps on this host.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "frontend/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml.example"
      - ".github/workflows/build-image.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/shariski/fpl-autopilot

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Pull & restart on the VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /opt/fpl-autopilot
            export IMAGE_TAG="${IMAGE_TAG}"
            docker compose pull
            docker compose up -d
            docker image prune -f
        env:
          IMAGE_TAG: ${{ github.sha }}
